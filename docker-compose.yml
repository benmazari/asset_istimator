version: '3.8'

services:
  web:
    build: .
    container_name: amortissement_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # IMPORTANT: config.yaml must exist as a FILE on the host before starting.
      # If Docker created it as a directory, run: sudo rm -rf ./config.yaml
      # then copy your config.yaml file here, then: docker compose up -d
      - type: bind
        source: ./config.yaml
        target: /app/config.yaml
        read_only: true
      - ./output:/app/output
    environment:
      - TZ=Africa/Algiers
